<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Kanji Quiz Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Handwritten signature font -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 32px 16px;
      background: radial-gradient(circle at 20% 20%, #1f1f1f, #0d0d0d 45%);
      color: #f5f5f5;
      text-align: center;
      min-height: 100vh;
    }

    /* Animated gradient flowing through title */
    h1 {
      font-size: 2rem;
      margin-bottom: 4px;
      letter-spacing: 0.025em;
      background: linear-gradient(90deg, #7da2ff, #ffffff, #a07bff, #7da2ff);
      background-size: 300%;
      -webkit-background-clip: text;
      color: transparent;
      animation: flow 4s ease infinite;
    }

    @keyframes flow {
      0%   { background-position: 0%; }
      50%  { background-position: 100%; }
      100% { background-position: 0%; }
    }

    /* Signature styling */
    .author {
      margin-top: 6px;
      margin-bottom: 26px;
      font-family: "Dancing Script", cursive;
      font-size: 1.7rem;
      color: #cdd7ff;
      opacity: 0.9;
      letter-spacing: 0.05em;
      text-shadow: 0 0 10px rgba(130,150,255,0.35);
    }

    .subtitle {
      font-size: 1rem;
      color: #c3c3c3;
      margin-bottom: 28px;
    }

    .menu {
      max-width: 540px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    /* Glassmorphic chapter buttons */
    a {
      padding: 16px;
      border-radius: 15px;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
      font-size: 1.1rem;
      transition: transform 0.15s ease, background 0.15s ease;
      display: block;
      -webkit-tap-highlight-color: transparent;
    }

    /* Mobile tap effect */
    a:active {
      transform: scale(0.97);
      background: rgba(255,255,255,0.18);
    }

    footer {
      margin-top: 40px;
      color: #888;
      font-size: 0.85rem;
    }
    /* Animated underline under the title */
.title-underline {
  width: 160px;
  height: 3px;
  margin: 10px auto 22px;
  border-radius: 999px;

  background: linear-gradient(90deg, #7da2ff, #ffffff, #a07bff, #7da2ff);
  background-size: 300%;
  animation: flow 4s ease infinite;
  opacity: 0.85;
}

  </style>
</head>

<body>

  <h1>Kanji Quiz</h1>
  <div class="title-underline"></div>

    <div class="author">— Ayush</div>
  <div class="subtitle">漢字チャレンジ</div>
  

<div class="menu">
  <a href="chapter1.html">第1章</a>
  <a href="chapter2.html">第2章</a>
  <a href="chapter3.html">第3章</a>
  <a href="chapter4.html">第4章</a>
  <a href="chapter5.html">第5章</a>
  <a href="chapter6.html">第6章</a>
  <a href="chapter7.html">第7章</a>
  <a href="chapter8.html">第8章</a>
<footer>
  ──────── K3 • 2025 ────────
</footer>

</body>
</html>
