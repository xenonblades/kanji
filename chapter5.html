<!DOCTYPE html>
<html class="notranslate" lang="ja">
<head>
  <meta name="google" content="notranslate">
  <meta http-equiv="Content-Language" content="ja">
  <meta charset="UTF-8">
  <title>Chapter 1 Kanji Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: radial-gradient(circle at 20% 20%, #1f1f1f, #0d0d0d 45%);
      color: #f5f5f5;
      min-height: 100vh;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      background: rgba(22, 22, 22, 0.8);
      border: 1px solid #2b2b2b;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(3px);
    }
    h1 {
      font-size: 1.45rem;
      margin: 0 0 4px;
      letter-spacing: 0.04em;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #c0c0c0;
      margin-bottom: 12px;
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    #section-label {
      font-size: 0.95rem;
      color: #e8e8e8;
    }
    .score-pill {
      background: #1f2b46;
      color: #cbd9ff;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
    }
    .progress-bar {
      position: relative;
      width: 100%;
      height: 10px;
      background: #1b1b1b;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
      border: 1px solid #2e2e2e;
    }
    .progress-bar span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #42a5f5, #7c4dff);
      transition: width 0.25s ease;
    }
    #question {
      margin: 16px 0 12px;
      line-height: 1.6;
      font-size: 1.08rem;
    }
    .hl {
      background: #ffee58;
      color: #000;
      padding: 2px 4px;
      border-radius: 3px;
    }
    .meta {
      font-size: 0.8rem;
      color: #bbb;
    }
    .options {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
    }
    button.option {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #3a3a3a;
      background: #1b1b1b;
      color: #f5f5f5;
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.2s ease, background 0.2s ease;
    }
    button.option:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: #4f7cff;
    }
    button.option:disabled {
      opacity: 0.75;
      cursor: default;
    }
    button.option.correct {
      border-color: #4caf50;
      background: #19351d;
    }
    button.option.wrong {
      border-color: #f44336;
      background: #351a1a;
    }
    #feedback {
      margin-top: 10px;
      min-height: 1.4em;
      font-size: 0.95rem;
    }
    #next-btn, #restart-btn {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      font-size: 0.98rem;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.01em;
      transition: transform 0.08s ease, filter 0.2s ease;
    }
    #next-btn:hover, #restart-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.07);
    }
    #next-btn {
      background: linear-gradient(135deg, #2962ff, #0d47a1);
      color: #fff;
    }
    #restart-btn {
      background: #444;
      color: #fff;
    }
    #progress {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #bbb;
    }
    .hint {
      margin-top: 6px;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Chapter 1 漢字 001～072 クイズ</h1>
  <div class="subtitle">シンプル4択 / choose 1 option → see Correct / Wrong</div>

  <div class="meta-row">
    <div class="meta" id="section-label"></div>
    <div class="score-pill" id="score-pill">Score: 0 / 0</div>
  </div>
  <div class="progress-bar" aria-hidden="true"><span id="progress-bar-fill"></span></div>
  <div id="question"></div>

  <div class="options" id="options"></div>

  <div id="feedback"></div>
  <div id="progress"></div>
  <div class="hint">Press 1–4 to answer quickly.</div>

  <button id="next-btn" style="display:none;">Next</button>
  <button id="restart-btn" style="display:none;">Restart</button>
</div>

<script>
  // 0-based correct index
  const quiz = [
    // 問題1（読む）
    {section:"問題1（読む）", q:"台風で大会が<span class=\"hl\">延期</span>になった。", opts:["えんき","のうき","ていき","にんき"], correct:0},
    {section:"問題1（読む）", q:"森田さんは大学で<span class=\"hl\">講師</span>として働いている。", opts:["いし","りょうし","ぎし","こうし"], correct:3},
    {section:"問題1（読む）", q:"社長にいろいろ提案をしたが<span class=\"hl\">無視</span>された。", opts:["むしょう","むしん","むし","むせん"], correct:2},
    {section:"問題1（読む）", q:"A氏は大統領<span class=\"hl\">候補</span>として知られている。", opts:["こうほ","こうほう","こうぽ","こうぽう"], correct:0},
    {section:"問題1（読む）", q:"<span class=\"hl\">生態系</span>のバランスを保つことが課題だ。", opts:["しょうたいけい","せいたいけい","しょうだいけい","せいだいけい"], correct:1},
    {section:"問題1（読む）", q:"<span class=\"hl\">浴衣</span>を着て花火大会に行く。", opts:["よくい","よくえ","ゆかた","ゆがた"], correct:2},
    {section:"問題1（読む）", q:"抽選の結果はホームページに<span class=\"hl\">掲載</span>する予定だ。", opts:["れんざい","れんさい","けいざい","けいさい"], correct:3},
    {section:"問題1（読む）", q:"地震で被害を受けた人々の<span class=\"hl\">救援</span>に向かう。", opts:["きゅうめい","きゅうきゅう","きゅうじょ","きゅうえん"], correct:3},
    {section:"問題1（読む）", q:"隣の人がいきなり大声で叫び出して、<span class=\"hl\">驚いた</span>。", opts:["おどろいた","あばいた","かたむいた","いただいた"], correct:0},
    {section:"問題1（読む）", q:"法師によって妖怪が<span class=\"hl\">封印</span>された。", opts:["ほういん","ふういん","せいいん","なついん"], correct:1},
  
    // 問題2（漢字）
    {section:"問題2（漢字）", q:"ふくしが充実している国で暮らしたい。", opts:["福視","福祉","祝祉","祖祉"], correct:1},
    {section:"問題2（漢字）", q:"誕生日パーティーに<span class=\"hl\">さそわれた</span>。", opts:["誘われた","嫌われた","祝われた","補われた"], correct:0},
    {section:"問題2（漢字）", q:"親友に<span class=\"hl\">うらぎられて</span>つらかった。", opts:["袋切られて","装切られて","裁切られて","裏切られて"], correct:3},
    {section:"問題2（漢字）", q:"ご健康をお<span class=\"hl\">いのり</span>しております。", opts:["謝り","散り","昇り","祈り"], correct:3},
    {section:"問題2（漢字）", q:"殺人の容疑で<span class=\"hl\">さいばん</span>にかけられた。", opts:["袋判","装判","裁判","載判"], correct:2},
    {section:"問題2（漢字）", q:"気温がおおはばに上昇した。", opts:["大幅","大帽","大帳","大帙"], correct:0},
    {section:"問題2（漢字）", q:"ミサイルが発射する<span class=\"hl\">すんぜん</span>に爆発した。", opts:["封前","射前","付前","寸前"], correct:3},
    {section:"問題2（漢字）", q:"一人暮らしは自由だが、<span class=\"hl\">こどく</span>を感じる時もある。", opts:["孤立","孤独","孤児","孤影"], correct:1},
    {section:"問題2（漢字）", q:"周りから<span class=\"hl\">そんけい</span>されている。", opts:["専敬","尊敵","尊敬","専敵"], correct:2},
    {section:"問題2（漢字）", q:"心の<span class=\"hl\">せまい</span>人と付き合いたくない。", opts:["荒い","狭い","怖い","硬い"], correct:1},
  
    // 問題3（読む）
    {section:"問題3（読む）", q:"<span class=\"hl\">謝罪</span>", opts:["はんざい","しゃざい","ゆうざい","むざい"], correct:1},
    {section:"問題3（読む）", q:"<span class=\"hl\">看護</span>", opts:["かんびょう","かんご","かいご","ほご"], correct:1},
    {section:"問題3（読む）", q:"<span class=\"hl\">暴力</span>", opts:["ばくりょく","ばくりき","ぼうりょく","ぼうりき"], correct:2},
    {section:"問題3（読む）", q:"<span class=\"hl\">為替</span>", opts:["かわせ","りょうがえ","こうたい","だいたい"], correct:0},
    {section:"問題3（読む）", q:"<span class=\"hl\">必需品</span>", opts:["ひつぜんひん","ひつようひん","ひつじゅひん","ひっすぴん"], correct:2},
    {section:"問題3（読む）", q:"<span class=\"hl\">孫</span>", opts:["ひま","だれ","むすめ","まご"], correct:3},
    {section:"問題3（読む）", q:"<span class=\"hl\">容姿</span>", opts:["ようし","ゆうし","ようせ","ゆうせ"], correct:0},
    {section:"問題3（読む）", q:"<span class=\"hl\">衣装</span>", opts:["えそう","えしょう","いそう","いしょう"], correct:3},
    {section:"問題3（読む）", q:"<span class=\"hl\">匹敵</span>", opts:["ひてき","ひってき","ひでき","ぴてき"], correct:1},
    {section:"問題3（読む）", q:"<span class=\"hl\">物騒</span>", opts:["ものさわぎ","ぶつそう","ぶっそう","ぶそう"], correct:2},
  
    // 問題4（漢字）
    {section:"問題4（漢字）", q:"席を<span class=\"hl\">ゆずる</span>", opts:["謝る","祈る","被る","譲る"], correct:3},
    {section:"問題4（漢字）", q:"<span class=\"hl\">じらい</span>を踏む", opts:["地雷","地零","地需","地曇"], correct:0},
    {section:"問題4（漢字）", q:"<span class=\"hl\">いやみ</span>を言う", opts:["文句","悪口","嫌味","皮肉"], correct:2},
    {section:"問題4（漢字）", q:"帽子を<span class=\"hl\">かぶる</span>", opts:["被る","譲る","祈る","謝る"], correct:0},
    {section:"問題4（漢字）", q:"桜が<span class=\"hl\">ちる</span>", opts:["曇る","昇る","被る","散る"], correct:3},
    {section:"問題4（漢字）", q:"罪を<span class=\"hl\">おかす</span>", opts:["倒す","犯す","催す","隠す"], correct:1},
    {section:"問題4（漢字）", q:"日が<span class=\"hl\">のぼる</span>", opts:["曇る","昇る","載る","被る"], correct:1},
    {section:"問題4（漢字）", q:"仕事に<span class=\"hl\">せんねん</span>する", opts:["専攻","専属","専念","専制"], correct:2},
    {section:"問題4（漢字）", q:"新年を<span class=\"hl\">いわう</span>", opts:["祝う","補う","救う","敬う"], correct:0},
    {section:"問題4（漢字）", q:"代金を<span class=\"hl\">せいきゅう</span>する", opts:["誘求","諸求","護求","請求"], correct:3}
  ];
  

  let current = 0;
  let score = 0;
  let optionButtons = [];

  const sectionLabel = document.getElementById("section-label");
  const questionEl = document.getElementById("question");
  const optionsEl  = document.getElementById("options");
  const feedbackEl = document.getElementById("feedback");
  const progressEl = document.getElementById("progress");
  const nextBtn    = document.getElementById("next-btn");
  const restartBtn = document.getElementById("restart-btn");
  const scorePill  = document.getElementById("score-pill");
  const progressFill = document.getElementById("progress-bar-fill");

  function renderQuestion() {
    const item = quiz[current];
    sectionLabel.textContent = item.section + `（${current+1} / ${quiz.length}）`;
    questionEl.innerHTML = item.q;
    feedbackEl.textContent = "";
    nextBtn.style.display = "none";
    restartBtn.style.display = "none";

    optionsEl.innerHTML = "";
    optionButtons = item.opts.map((opt, idx) => {
      const btn = document.createElement("button");
      btn.className = "option";
      btn.dataset.idx = idx;
      btn.textContent = `${idx+1}. ${opt}`;
      btn.onclick = () => handleAnswer(idx, btn);
      optionsEl.appendChild(btn);
      return btn;
    });

    updateProgress();
  }

  function handleAnswer(idx, clickedBtn) {
    const item = quiz[current];
    const correctIdx = item.correct;
    const buttons = optionsEl.querySelectorAll("button.option");

    buttons.forEach((b, i) => {
      b.disabled = true;
      if (i === correctIdx) b.classList.add("correct");
    });

    if (idx === correctIdx) {
      feedbackEl.textContent = "いいですね！ 👍";
      score++;
    } else {
      clickedBtn.classList.add("wrong");
      const correctText = item.opts[correctIdx];
      feedbackEl.textContent = "ちょっと違います… 😅";
    }
    updateProgress();

    if (current < quiz.length - 1) {
      nextBtn.style.display = "block";
    } else {
      nextBtn.style.display = "none";
      restartBtn.style.display = "block";
      feedbackEl.textContent += "  お疲れさま！ / Finished!";
    }
  }

  nextBtn.addEventListener("click", () => {
    current++;
    renderQuestion();
  });

  restartBtn.addEventListener("click", () => {
    current = 0;
    score = 0;
    renderQuestion();
  });

  document.addEventListener("keydown", (event) => {
    if (!optionButtons.length) return;
    const keyNumber = Number(event.key);
    if (keyNumber >= 1 && keyNumber <= optionButtons.length) {
      const btn = optionButtons[keyNumber - 1];
      if (!btn.disabled) {
        btn.click();
      }
    }
  });

  function updateProgress() {
    const answeredCount = Math.min(quiz.length, current + (feedbackEl.textContent ? 1 : 0));
    const statusLabel = feedbackEl.textContent
      ? `Answered ${answeredCount} / ${quiz.length}`
      : `Question ${current + 1} / ${quiz.length}`;

    progressEl.textContent = `${statusLabel} • Score: ${score} / ${quiz.length}`;
    scorePill.textContent = `Score: ${score} / ${quiz.length}`;
    const width = (answeredCount / quiz.length) * 100;
    progressFill.style.width = `${width}%`;
  }

  renderQuestion();
</script>
</body>
</html>
